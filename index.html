<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireUSA Jobs</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.hero img{
width:100%;
display:block;
}

.content{
max-width:1000px;
margin:auto;
padding:20px;
text-align:center;
}

h1{
color:#0d6efd;
}

.btn{
display:inline-block;
background:#28a745;
color:white;
padding:15px 30px;
text-decoration:none;
border-radius:5px;
font-size:20px;
font-weight:bold;
margin:20px 0;
}

.box{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
background:#0d6efd;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<div class="hero">
<img src="hero.jpg" alt="USA Jobs">
</div>

<div class="content">

<h1>Apply For USA Jobs</h1>

<p>
Complete the application process and submit your information below.
</p>

<a href="YOUR_APPLY_LINK_HERE" target="_blank" class="btn">
Apply Now
</a>

<div class="box">
<h2>Application Process</h2>

<p>1. Click Apply Now</p>
<p>2. Complete the required process</p>
<p>3. Return to this page</p>
<p>4. Submit your application</p>
</div>

<div class="box">

<h2>Submit Application</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Phone Number" required>

<input type="text" placeholder="Report ID / Confirmation Number">

<textarea placeholder="Additional Information"></textarea>

<button type="submit">
Submit Application
</button>

</form>

</div>

</div>

<footer>
© 2026 HireUSA. All Rights Reserved.
</footer>

</body>
</html>
